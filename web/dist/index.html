<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mihomo for fnOS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="max-w-4xl mx-auto px-6 py-10" x-data="app()" x-init="init()">

  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Mihomo</h1>
      <p class="text-sm text-gray-500 mt-1">Clash.Meta 多协议代理 · fnOS 集成面板</p>
    </div>
    <a href="/clash/" class="text-sm bg-gray-800 text-white px-4 py-2 rounded hover:bg-gray-700">
      高级管理 (MetaCubeXD) →
    </a>
  </div>

  <!-- Status bar -->
  <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5 mb-6 grid grid-cols-2 gap-4">
    <div>
      <div class="text-xs text-gray-500 uppercase">内核版本</div>
      <div class="text-lg font-semibold mt-1" x-text="status.version?.version || '—'"></div>
    </div>
    <div>
      <div class="text-xs text-gray-500 uppercase">连接状态</div>
      <div class="mt-1">
        <span class="badge" :class="status.version ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
              x-text="status.version ? '● 运行中' : '○ 离线'"></span>
      </div>
    </div>
  </div>

  <!-- Subscription -->
  <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
    <h2 class="text-lg font-semibold mb-1">订阅管理</h2>
    <p class="text-sm text-gray-500 mb-4">填入 Clash 格式订阅 URL,mihomo 会自动拉取节点并每 24 小时刷新.</p>
    <div class="flex gap-2">
      <input type="url" x-model="subUrl" placeholder="https://your-subscription-url/clash"
             class="flex-1 px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
      <button @click="saveSub" :disabled="saving"
              class="px-5 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:bg-gray-400">
        <span x-show="!saving">保存并应用</span>
        <span x-show="saving">应用中…</span>
      </button>
    </div>
    <p x-show="message" class="mt-3 text-sm" :class="messageOK ? 'text-green-600' : 'text-red-600'" x-text="message"></p>
  </div>
    <!-- fnOS Overrides -->
  <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
    <h2 class="text-lg font-semibold mb-1">fnOS 旁路由优化</h2>
    <p class="text-sm text-gray-500 mb-4">每次保存订阅后, dashboard 自动确保以下字段适配 fnOS 旁路由场景 (基于 mihomo 实战经验)</p>
    <ul class="space-y-2 text-sm">
      <template x-for="o in overrides" :key="o.key">
        <li class="flex items-start gap-2">
          <span class="text-green-600 mt-0.5">✓</span>
          <div>
            <code class="text-xs bg-gray-100 px-1.5 py-0.5 rounded" x-text="o.key"></code>
            <span class="text-gray-700 ml-1" x-text="o.desc"></span>
          </div>
        </li>
      </template>
    </ul>
  </div>

  <!-- Logs -->
  <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
    <h2 class="text-lg font-semibold mb-3">日志 (最近 100 行)</h2>
    <pre class="text-xs bg-gray-900 text-green-400 p-3 rounded overflow-auto h-64 whitespace-pre-wrap" x-text="logs || '加载中…'"></pre>
  </div>

</div>

<script>
function app() {
  return {
    subUrl: '',
    status: {},
    logs: '',
    overrides: [],
    saving: false,
    message: '',
    messageOK: true,

    async init() {
      await this.loadAll();
      setInterval(() => this.loadAll(), 5000);
    },

    async loadAll() {
      try {
        const [statusRes, subRes, logsRes, proxiesRes] = await Promise.all([
          fetch('/api/status').then(r => r.json()),
          fetch('/api/subscription').then(r => r.json()),
          fetch('/api/logs').then(r => r.text()),
          fetch('/api/overrides').then(r => r.json()).catch(() => ({overrides:[]})),
          fetch('/api/proxies').then(r => r.json()).catch(() => null),
        ]);
        this.status = statusRes;
        if (!this.subUrl) this.subUrl = subRes.url || '';
        this.logs = logsRes;
        this.overrides = ovRes.overrides || [];
      } catch (e) { console.warn(e); }
    },

    async saveSub() {
      if (!this.subUrl) { this.message = '请填入订阅 URL'; this.messageOK = false; return; }
      this.saving = true;
      this.message = '';
      try {
        const r = await fetch('/api/subscription', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: this.subUrl }),
        });
        const d = await r.json();
        if (r.ok && d.ok) {
          this.message = d.warning ? '⚠ ' + d.warning : '✓ 订阅已应用, mihomo 重新加载完成';
          this.messageOK = !d.warning;
          setTimeout(() => this.loadAll(), 2000);
        } else {
          this.message = '✗ ' + (d.error || 'unknown error');
          this.messageOK = false;
        }
      } catch (e) {
        this.message = '✗ ' + e.message;
        this.messageOK = false;
      } finally {
        this.saving = false;
      }
    },

        });
        if (r.ok) this.loadAll();
      } catch (e) { console.warn(e); }
    },
  };
}
</script>

</body>
</html>
